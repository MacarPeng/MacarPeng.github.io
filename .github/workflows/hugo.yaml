# 自动部署 Hugo 到 GitHub Pages 的脚本
name: Deploy Hugo site to Pages

on:
  # 当你向 main 分支 push 代码时触发
  push:
    branches: ["main"]

  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 设置 GitHub Token 的权限，允许部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # 编译阶段
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.140.0 # 建议用较新版本
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive  # 这一行非常重要：下载主题文件
          fetch-depth: 0         # 获取所有历史记录

      - name: Setup Hugo
        uses: jakejarvis/hugo-build-action@master
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended-version: true # 你的主题需要 extended 版本

      - name: Build with Hugo
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署阶段
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5